<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" sizes="32x32" href="favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="favicon-16x16.png">
    <link rel="apple-touch-icon" sizes="180x180" href="apple-touch-icon.png">
    <link rel="manifest" href="site.webmanifest">
    <meta name="robots" content="noindex,follow">
    <meta name="theme-color" content="#0a0a0f">
    <title>Stránka nebyla nalezena | IV Production</title>


    <style>
        :root { --gold:#e8c547; --dark:#0a0a0f; --light:#fafafa; --muted:#b7b7c0; }
        * { box-sizing:border-box; }
        body { align-items:center; background:radial-gradient(circle at 50% 15%,rgba(232,197,71,.14),transparent 34rem),var(--dark); color:var(--light); display:flex; font-family:Arial,sans-serif; justify-content:center; margin:0; min-height:100vh; padding:2rem; text-align:center; }
        main { max-width:760px; }
        .logo { height:auto; margin-bottom:2rem; width:190px; }
        .code { color:var(--gold); font-size:.78rem; font-weight:800; letter-spacing:.2em; text-transform:uppercase; }
        h1 { font-family:Georgia,serif; font-size:clamp(2.5rem,8vw,5.5rem); line-height:1; margin:.8rem 0 1.2rem; }
        p { color:var(--muted); font-size:clamp(1rem,2.5vw,1.2rem); line-height:1.7; margin:0 auto 2rem; max-width:620px; }
        .actions { display:flex; flex-wrap:wrap; gap:1rem; justify-content:center; }
        a { border:1px solid rgba(232,197,71,.55); border-radius:12px; color:var(--light); font-weight:800; padding:.95rem 1.4rem; text-decoration:none; transition:.25s ease; }
        a.primary { background:linear-gradient(120deg,#9e7718,#ffe55c,#a57c19); border:0; color:#111; }
        a:hover { box-shadow:0 14px 38px rgba(201,162,39,.24); transform:translateY(-3px); }
    </style>
</head>
<body>
    <main>
        <img class="logo" src="logo-light.png" width="1024" height="531" alt="IV Production">
        <div class="code">Chyba 404</div>
        <h1>Tahle stránka už není v záběru.</h1>
        <p>Odkaz mohl být změněn nebo stránka neexistuje. Vraťte se na hlavní stránku, prohlédněte si portfolio nebo nám rovnou napište.</p>
        <div class="actions">
            <a class="primary" href="index.html">Zpět na hlavní stránku</a>
            <a href="portfolio.html">Prohlédnout portfolio</a>
            <a href="kontakt.html">Kontaktovat nás</a>
        </div>
    </main>
</body>
</html>
