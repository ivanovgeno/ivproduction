name: Code Quality

on:
  push:
    branches:
      - main
      - feature/php-rebuild
      - feature/3d-24k-rebuild
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Validate PHP syntax
        run: find . -type f -name '*.php' -print0 | xargs -0 -n1 php -l

      - name: Validate classic JavaScript syntax
        run: |
          node --check assets/js/app.js
          node --check assets/js/runtime-polish.js
          node --check assets/js/interaction-v3.js

      - name: Validate module JavaScript syntax
        run: node --input-type=module --check < assets/js/scene-v5.js
