name: PHP Quality

on:
  push:
    branches:
      - main
      - feature/php-rebuild
      - feature/3d-24k-rebuild
  pull_request:

permissions:
  contents: read

jobs:
  php-lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Validate PHP syntax
        run: find . -type f -name '*.php' -print0 | xargs -0 -n1 php -l
